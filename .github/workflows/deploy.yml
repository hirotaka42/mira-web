name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages へのデプロイは 1 つだけ進行 (新しい push が古いものを取り消す)
concurrency:
  group: pages
  cancel-in-progress: true

# 必要最小限の権限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (static export)
        env:
          # プロジェクトサイトの場合はサブパスが /<repo>/ になる。
          # ユーザーサイト (<user>.github.io) や CNAME 利用時は空文字に上書きすること。
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Add .nojekyll
        # GitHub Pages の Jekyll 処理で _next/ などアンダースコア始まりが弾かれるのを防ぐ
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
