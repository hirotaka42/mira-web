<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>issue 台帳 — &lt;リポジトリ名&gt;</title>
<style>
  :root{--bg:#0b0e14;--panel:#11151f;--line:#252b3b;--tx:#dde3f0;--tx2:#8b93a7;
    --acc:#7aa2f7;--ok:#9ece6a;--warn:#e0af68;--err:#f7768e}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);line-height:1.75;
    font-family:"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:40px 24px 100px}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:var(--tx2);margin:0 0 24px}
  .card{display:block;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:16px 20px;margin:12px 0;text-decoration:none;color:inherit}
  .card:hover{border-color:var(--acc)}
  .card h2{font-size:16px;margin:0 0 4px;color:var(--acc)}
  .card p{margin:4px 0 0;color:var(--tx2);font-size:14px}
  .tags{margin-top:8px}
  .tag{display:inline-block;font-size:11px;padding:2px 9px;border-radius:999px;
    background:#1a2030;color:var(--tx2);margin-right:6px}
  .st{font-weight:700}.st-open{color:var(--warn)}.st-done{color:var(--ok)}
  .empty{color:var(--tx2);border:1px dashed var(--line);border-radius:12px;padding:24px;text-align:center}
  code{background:#1a2030;color:#9fd3ff;padding:1px 6px;border-radius:5px;font-family:Consolas,monospace;font-size:13px}
  footer{margin-top:48px;color:#586079;font-size:12px;border-top:1px solid var(--line);padding-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <h1>issue 台帳</h1>
  <p class="sub">課題対応(不具合・改善要望など問題駆動)の一覧。バケット <code>docs/issue/</code>。</p>

  <p class="empty">まだエントリがありません。<code>node scripts/new-doc.mjs case issue "タイトル"</code> で起票する。</p>
  <!-- new-doc:insert (このコメントの直前に新しいカードが挿入される。消さない) -->

  <footer>1 issue = 1 ディレクトリ(<code>docs/issue/&lt;5桁ゼロ埋め&gt;/</code>)。連番はバケットごと。詳細は <code>AGENTS-SHARED.md §8</code>。</footer>
</div>
</body>
</html>
